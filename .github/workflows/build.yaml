name: Build

permissions:
  contents: read

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  build-java-17:
    name: Build and Test (Java 17)
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: 17

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: corretto

      - name: Cache Maven local repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java17-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java17-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Verify formatting and license headers
        run: ./mvnw spotless:check

      - name: Build and Test
        run: ./mvnw -B clean verify
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

  build-macos:
    name: Build and Test (macOS / Java 17)
    if: false
    needs: build-java-17
    runs-on: macos-latest
    continue-on-error: true

    env:
      JAVA_VERSION: 17

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: corretto

      - name: Install Docker via Colima
        run: |
          brew install colima docker
          colima start

      - name: Cache Maven local repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java17-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java17-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Build and Test
        run: ./mvnw -B clean verify
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

  build-java-21:
    name: Build and Test (Java 21)
    needs: build-java-17
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: 21

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: corretto

      - name: Cache Maven local repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java21-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java21-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Build and Test
        run: ./mvnw -B clean verify
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

  build-java-25:
    name: Build and Test (Java 25)
    needs: build-java-21
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: corretto

      - name: Cache Maven local repository
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: maven-local-repo-${{ runner.os }}-java25-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-local-repo-${{ runner.os }}-java25-

      - name: Clean Maven Wrapper Distributions
        run: rm -rf ~/.m2/wrapper/dists/

      - name: Build and Test
        run: ./mvnw -B clean verify -Dpmd.skip=true
        env:
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

  documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'

      - name: Install jq
        uses: dcarbone/install-jq-action@v3
        with:
          version: '1.7.1'

      - name: Build documentation
        run: ./scripts/build-documentation.sh
